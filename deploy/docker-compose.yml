services:
  agentmon-hub:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    image: agentmon-hubd:dev
    restart: unless-stopped
    ports:
      # NOTE: with trust_forwarded_proto: true the hub trusts X-Forwarded-For, so its
      # listen port MUST be reachable only by the trusted proxy (this loopback bind, or a firewall).
      - "127.0.0.1:8080:8080"   # behind Caddy on the host; bind LAN in real deploys
    volumes:
      - agentmon-data:/data
    # After `docker compose up`, enroll each box with:
    #   curl <external_origin>/install.sh | sudo bash
    # then admit it from the hub host:
    #   docker compose exec agentmon-hub /agentmon-hubd server approve <hostname>
volumes:
  agentmon-data:
