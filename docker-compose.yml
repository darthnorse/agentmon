# Pin the compose project name so `docker compose up -d --build` always targets the
# same container, regardless of the checkout directory name or CWD (without a pin the
# project name defaults to this file's directory basename).
name: agentmon

services:
  agentmon-hub:
    build:
      context: .
      dockerfile: deploy/Dockerfile
    image: agentmon-hubd:dev
    restart: unless-stopped
    # Host networking: simplest on a LAN, and required on nested hosts (Proxmox
    # LXC / Docker-in-LXC) where bridge networking can't set net sysctls. The hub
    # binds the address from config.yaml's `listen` (e.g. 0.0.0.0:8378). To put
    # Caddy in front for TLS, bind `listen` to loopback and proxy to it.
    network_mode: host
    environment:
      # linuxserver.io / Unraid convention: the hub drops to this user, so the
      # bind-mounted ./data ends up owned by your host user — no chown needed.
      # Unraid: PUID=99 PGID=100.
      - PUID=${PUID:-1000}
      - PGID=${PGID:-1000}
    volumes:
      # config.yaml + the SQLite DB live in deploy/data. First run:
      #   cp deploy/hub.config.example.yaml deploy/data/config.yaml   (then edit it)
      # Unraid: point this at /mnt/user/appdata/agentmon.
      - ./deploy/data:/data
    # Enroll each box:  curl <external_origin>/install.sh | sudo bash
    # Then admit it:    docker compose exec agentmon-hub /agentmon-hubd server approve <hostname>
